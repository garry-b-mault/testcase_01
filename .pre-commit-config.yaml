# .pre-commit-config.yaml — Python Governance (Layers 0-8)
# Mault Production-Readiness Kit — Steps 6 + 8
#
# Install: bash scripts/install-precommit-hooks.sh
# Run all: pre-commit run --all-files -c .pre-commit-config.yaml

fail_fast: true

repos:
  # =========================================================================
  # LAYER 0: CONFIG FILE VALIDATION (Fail-First Safety)
  # =========================================================================
  - repo: local
    hooks:
      - id: config-validation
        name: Config File Validation (Layer 0)
        entry: bash scripts/validate-configs-py.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # =========================================================================
  # LAYERS 1-4: STANDARD FILE HYGIENE
  # =========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(\.mault/|coverage/)
      - id: end-of-file-fixer
        exclude: ^(\.mault/|coverage/)
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, master, --branch, main]

  # =========================================================================
  # LAYERS 2-4: PYTHON LINTING (ruff — replaces black + flake8 + isort)
  # =========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
        files: \.py$
      - id: ruff-format
        files: \.py$

  # =========================================================================
  # LAYER 6: SECURITY — SECRET DETECTION
  # =========================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: package-lock\.json|\.env$

  # =========================================================================
  # LAYER 8: GOVERNANCE — Python Quality Ratchets
  # =========================================================================
  - repo: local
    hooks:
      - id: py-guardrails
        name: SRP Guardrails — Python (Layer 8)
        entry: python3 scripts/governance/guardrails_check.py
        language: system
        files: \.py$
        pass_filenames: true
        stages: [pre-commit]

      - id: py-type-holes
        name: Iron Dome — Python type holes (Layer 8)
        entry: python3 scripts/governance/check_type_holes.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: py-silent-catches
        name: Iron Dome — Python silent catches (Layer 8)
        entry: python3 scripts/governance/check_silent_catches.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: py-noqa
        name: Escape Hatch — Python noqa (Layer 8)
        entry: python3 scripts/governance/check_noqa.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: py-mock-tax
        name: Rising Tide — Python mock tax (Layer 8)
        entry: python3 scripts/governance/check_mock_tax.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: py-skipped-tests
        name: Test Discipline — Python skipped tests (Layer 8)
        entry: python3 scripts/governance/check_skipped_tests.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: py-circular-deps
        name: Dependency Health — Python circular imports (Layer 8)
        entry: python3 scripts/governance/check_circular_deps.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: py-security-critical
        name: Security Review — Python @security-critical (Layer 8)
        entry: python3 scripts/governance/check_security_critical.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
