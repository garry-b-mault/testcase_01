name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Type check (TypeScript)
        run: npx tsc --noEmit

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (Python/ruff)
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Test with coverage (TypeScript/Jest)
        run: npx jest --coverage --forceExit
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          OPENAI_API_KEY: sk-test-key

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Test with coverage (Python/pytest)
        run: pytest tests/ --cov=app --cov-report=term-missing -v
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          OPENAI_API_KEY: sk-test-key

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Integration tests (TypeScript)
        run: npx jest --testPathPattern="tests/integration" --forceExit
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          OPENAI_API_KEY: sk-test-key

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest

      - name: Integration tests (Python)
        run: pytest tests/integration/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          OPENAI_API_KEY: sk-test-key

  validate-pr-title:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            test
            refactor
            ci
            build
          requireScope: false

  validate-branch-name:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if echo "$BRANCH" | grep -qE '^(feat|fix|chore|docs|test|refactor|ci|build)\/[a-z0-9]+-[a-z0-9-]+$'; then
            echo "Branch name '$BRANCH' is valid"
          else
            echo "ERROR: Branch name '$BRANCH' must match pattern: <type>/<issue>-<description>"
            echo "Valid types: feat, fix, chore, docs, test, refactor, ci, build"
            echo "Example: feat/42-add-login or fix/7-null-pointer"
            exit 1
          fi
